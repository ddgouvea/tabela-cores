<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Cores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }
        .titulo{
            color: #CD5C5C;
        }

        .info {
            text-align: center;
            font-size: 14px;
            color: #B22222;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .info span {
            font-size: 18px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .color-box {
            width: 111px;
            height: 111px;
            /* Borda removida */
            border: none;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .color-box:hover {
            transform: scale(1.05);
        }

        /* Código hexadecimal */
        .color-hex {
            padding: 8px 4px;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
            color: #000000;
            background-color: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            font-weight: normal;
        }

        .color-hex:hover {
            color: #ffff00;
            font-weight: bold;
        }

        .color-display {
            flex: 1;
            cursor: pointer;
        }

        /* Nome da cor */
        .color-name {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: #000000;
            background-color: transparent;
            padding: 4px;
            margin: 0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: normal;
        }

        .color-name:hover {
            color: #ffff00;
            font-weight: bold;
        }

        /* Rodapé */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 15px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>

            { nome: 'Lavenderblush', hex: '#FFF0F5' },
            { nome: 'Mistyrose', hex: '#FFE4E1' }
        ];

        const container = document.getElementById('container');

        cores.forEach(cor => {
            const colorBox = document.createElement('div');
            colorBox.className = 'color-box';
            colorBox.style.backgroundColor = cor.hex;

            const isBlack = cor.hex.toUpperCase() === '#000000';
            const textColor = isBlack ? '#FFFFFF' : '#000000';

            const colorDisplay = document.createElement('div');
            colorDisplay.className = 'color-display';
            colorDisplay.addEventListener('click', () => copiar(cor.hex));

            const colorHex = document.createElement('div');
            colorHex.className = 'color-hex';
            colorHex.textContent = cor.hex;
            colorHex.style.color = textColor;
            colorHex.addEventListener('click', () => copiar(cor.hex));

            const colorName = document.createElement('div');
            colorName.className = 'color-name';
            colorName.textContent = cor.nome;
            colorName.style.color = textColor;
            colorName.addEventListener('click', () => copiar(cor.nome));

            colorBox.appendChild(colorHex);
            colorBox.appendChild(colorDisplay);
            colorBox.appendChild(colorName);

            container.appendChild(colorBox);
        });

        function copiar(texto) {
            navigator.clipboard.writeText(texto).then(() => {
                const alertBox = document.createElement('div');
                alertBox.style.position = 'fixed';
                alertBox.style.top = '20px';
                alertBox.style.left = '50%';
                alertBox.style.transform = 'translateX(-50%)';
                alertBox.style.backgroundColor = '#333';
                alertBox.style.color = '#fff';
                alertBox.style.padding = '12px 20px';
                alertBox.style.borderRadius = '6px';
                alertBox.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
                alertBox.style.zIndex = '1000';
                alertBox.style.fontFamily = 'Arial, sans-serif';
                alertBox.style.fontSize = '14px';
                alertBox.textContent = `Copiado: ${texto}`;

                document.body.appendChild(alertBox);

                setTimeout(() => {
                    alertBox.style.opacity = '0';
                    alertBox.style.transition = 'opacity 0.3s';
                    setTimeout(() => {
                        alertBox.remove();
                    }, 300);
                }, 1000);
            });
        }
